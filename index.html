<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad's Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Daddy`s calculator.css">
</head>

<body>
    <div class="calcdiv">
        <div class="calcs">
            <form action="" class="calculator-form">
                <div class="display">
                    <input type="text" name="display" id="dis" placeholder="0" readonly>
                </div>

                <div class="icons">
                    <ion-icon name="time-outline" id="time-btn" title="History" onclick="toggleHistory()"></ion-icon>
                    <ion-icon name="tablet-landscape-outline" id="ruler" title="Unit Converter"></ion-icon>
                    <ion-icon name="calendar-clear-outline" title="Date Calculator"></ion-icon>
                    <ion-icon name="backspace-outline" id="back" title="Delete"
                        onclick="dis.value = dis.value.slice(0, -1)"></ion-icon>
                </div>

                <div id="history-panel" class="history-panel">
                    <div class="history-header">
                        <span>History</span>
                        <ion-icon name="trash-outline" onclick="clearHistory()"></ion-icon>
                    </div>
                    <div id="history-log" class="history-log">
                        <div class="empty-msg">No history yet</div>
                    </div>
                </div>

                <div class="button-grid">
                    <input type="button" value="C" onclick="dis.value = ''" id="clear">
                    <input type="button" value="( )" onclick="dis.value+='()'" id="operat">
                    <input type="button" value="%" onclick="dis.value+='/100'" id="operat">
                    <input type="button" value="÷" onclick="dis.value+='/'" id="operator">

                    <input type="button" value="7" onclick="dis.value+='7'">
                    <input type="button" value="8" onclick="dis.value+='8'">
                    <input type="button" value="9" onclick="dis.value+='9'">
                    <input type="button" value="×" onclick="dis.value+='*'" id="operator">

                    <input type="button" value="4" onclick="dis.value+='4'">
                    <input type="button" value="5" onclick="dis.value+='5'">
                    <input type="button" value="6" onclick="dis.value+='6'">
                    <input type="button" value="-" onclick="dis.value+='-'" id="operator">

                    <input type="button" value="1" onclick="dis.value+='1'">
                    <input type="button" value="2" onclick="dis.value+='2'">
                    <input type="button" value="3" onclick="dis.value+='3'">
                    <input type="button" value="+" onclick="dis.value+='+'" id="operator">

                    <input type="button" value="+/-" onclick="toggleSign()">
                    <input type="button" value="0" onclick="dis.value+='0'">
                    <input type="button" value="." onclick="insertDecimal()" id="dot">
                    <input type="button" value="=" id="equals2" onclick="calculate()">
                </div>
            </form>
        </div>
    </div>

    <script>
        const dis = document.getElementById('dis');
        const historyLog = document.getElementById('history-log');

        function insertDecimal() {
            const val = dis.value;
            // Prevent decimal if empty or if last char is an operator
            if (val === '' || /[\+\-\*\/]$/.test(val)) return;

            // Get the current number being typed (after the last operator)
            const parts = val.split(/[\+\-\*\/x÷×]/);
            const lastNumber = parts[parts.length - 1];

            // If the last part already has a decimal, don't add another
            if (lastNumber.includes('.')) return;

            dis.value += '.';
        }

        function calculate() {
            try {
                if (dis.value === '') return;
                const expression = dis.value;
                const result = eval(expression.replace('×', '*').replace('÷', '/'));
                addToHistory(expression + ' = ' + result);
                dis.value = result;
            } catch (e) {
                dis.value = 'Error';
            }
        }

        function toggleSign() {
            if (dis.value === '') return;
            if (dis.value.charAt(0) === '-') {
                dis.value = dis.value.slice(1);
            } else {
                dis.value = '-' + dis.value;
            }
        }

        function toggleHistory() {
            const panel = document.getElementById('history-panel');
            panel.classList.toggle('active');
        }

        function addToHistory(item) {
            if (historyLog.querySelector('.empty-msg')) {
                historyLog.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = 'history-item';
            div.textContent = item;
            div.onclick = () => {
                dis.value = item.split(' = ')[1];
            };
            historyLog.prepend(div);
        }

        function clearHistory() {
            historyLog.innerHTML = '<div class="empty-msg">No history yet</div>';
        }
    </script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
